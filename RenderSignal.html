<!DOCTYPE html>
<link rel="icon" href="/RenderProductions.ico">
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NO SIGNAL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ffff80;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    width: 100vw;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 2rem 1rem;
  }

  #static {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 10;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0% { opacity: 0.3; }
    50% { opacity: 0.5; }
    100% { opacity: 0.35; }
  }

  #noisecanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    opacity: 0.06;
  }

  .container {
    position: relative;
    z-index: 5;
    text-align: center;
    max-width: 640px;
    padding: 2rem;
  }

  #signaltext {
    font-size: 44px;
    font-weight: bold;
    letter-spacing: 8px;
    color: #ffff80;
    text-shadow: 0 0 8px rgba(255,255,128,0.4);
    margin-bottom: 1rem;
    animation: glitchtext 4s infinite;
  }

  @keyframes glitchtext {
    0%, 92%, 100% { transform: translate(0,0); opacity: 1; }
    93% { transform: translate(-2px, 1px); opacity: 0.8; }
    94% { transform: translate(2px, -1px); opacity: 1; }
    95% { transform: translate(-1px, 0); opacity: 0.6; }
    96% { transform: translate(0,0); opacity: 1; }
  }

  #channeltext {
    font-size: 13px;
    letter-spacing: 4px;
    color: #a8b400;
    opacity: 0.7;
    margin-bottom: 3rem;
  }

  .tuner {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(255,255,128,0.25);
    padding: 16px 20px;
    background: rgba(255,255,128,0.02);
    flex-wrap: wrap;
    justify-content: center;
  }

  .tuner label {
    font-size: 12px;
    letter-spacing: 2px;
    color: #a8b400;
  }

  .tuner input {
    background: #0a0a0f;
    border: 1px solid rgba(255,255,128,0.3);
    color: #ffff80;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    padding: 8px 12px;
    width: 220px;
    text-align: center;
    text-transform: uppercase;
    outline: none;
  }

  .tuner input:focus {
    border-color: #ffff00;
  }

  .tuner button {
    background: transparent;
    border: 1px solid rgba(255,255,128,0.4);
    color: #ffff80;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 9px 16px;
    cursor: pointer;
  }

  .tuner button:hover {
    background: rgba(255,255,128,0.1);
  }

  #errormsg {
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #993c1d;
    min-height: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #errormsg.show { opacity: 1; }

  .signalblock {
    display: none;
    margin-top: 2.5rem;
    border-top: 1px solid rgba(255,255,128,0.2);
    padding-top: 2rem;
    text-align: left;
  }

  .signalblock.show {
    display: block;
    animation: fadein 0.6s ease;
  }

  @keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .fragment {
    font-size: 19px;
    letter-spacing: 2px;
    line-height: 1.9;
    color: #c8d600;
    word-break: break-word;
  }

  .fragment.decoy {
    color: #c8a000;
  }

  .freqlabel {
    font-size: 11px;
    color: #5f5e5a;
    letter-spacing: 2px;
    margin-bottom: 0.6rem;
  }

  .timestamp {
    font-size: 11px;
    color: #5f5e5a;
    letter-spacing: 2px;
    margin-top: 1rem;
  }

  #history {
    margin-top: 2rem;
  }
</style>
</head>
<body>

<canvas id="noisecanvas"></canvas>
<div id="static"></div>

<div class="container">
  <div id="signaltext">NO SIGNAL</div>
  <div id="channeltext">CH 01 — RENDER VISION — LAST BROADCAST UNKNOWN</div>

  <div class="tuner">
    <label for="codeinput">FREQ</label>
    <input type="text" id="codeinput" maxlength="40" placeholder="ENTER CODE" autocomplete="off">
    <button id="tunebtn">TUNE</button>
  </div>
  <div id="errormsg">SIGNAL NOT FOUND</div>

  <div id="history"></div>
</div>

<script>
  var canvas = document.getElementById('noisecanvas');
  var ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth || document.documentElement.clientWidth || 800;
    canvas.height = window.innerHeight || document.documentElement.clientHeight || 600;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawNoise() {
    var w = canvas.width;
    var h = canvas.height;
    if (!w || !h) return;
    var imageData = ctx.createImageData(w, h);
    var buffer = imageData.data;
    for (var i = 0; i < buffer.length; i += 4) {
      var v = Math.random() * 255;
      buffer[i] = v;
      buffer[i+1] = v;
      buffer[i+2] = v;
      buffer[i+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  setInterval(drawNoise, 80);
  drawNoise();

  // ============================================================
  // SIGNAL DATABASE
  // Each entry is a code mapped to a response.
  // type: "lore"        - genuine fragment of the real story
  //       "decoy"        - reads as genuine, is intentionally misleading
  //       "progressive"  - genuine fragment that also contains/hints next code
  //       "rare"         - master fragment, intended to require combining clues
  //
  // Edit CODE strings (left side, keep uppercase) and fragment/timestamp
  // text (right side) to build out your actual web. Add as many as you want.
  // ============================================================

  var SIGNALS = {
    "7540": {
      type: "lore",
      fragment: "He used to be so thoughtful.",
      timestamp: "RECOVERED FROM DEAD CHANNEL — TIMESTAMP UNKNOWN"
    },
    "RENDER": {
      type: "progressive",
      fragment: "The thing we always need more of, but the thing we waste the most.",
      timestamp: "RECOVERED FROM DEAD CHANNEL — TIMESTAMP UNKNOWN"
    },
    "TIME": {
      type: "progressive",
      fragment: "It heals all wounds.",
      timestamp: "RECOVERED FROM DEAD CHANNEL — TIMESTAMP UNKNOWN"
    },
   "67": {
     type: "decoy",
     fragment: "The 67 meme is officially dead to me. It’s reached that stage where an internet joke stops being a funny surprise and just becomes annoying background noise. At first, I loved it because people were being so creative with the references, but now it’s just the same punchline everywhere. It feels like people aren't even trying to be clever anymore; they’re just repeating it because everyone else is. \n It’s honestly frustrating how it pops up in every single comment section and Discord server I’m in. Instead of actually contributing to a conversation, it just derails everything with a reference I’ve already seen a thousand times. The shock value is gone, and without that, there’s no humor left—just predictable repetition. \n What bothers me most is how forced it feels now. People shoehorn it into conversations where it makes zero sense, which turns it from a joke into straight-up spam. I love how fast internet culture moves and how we’re always finding new ways to laugh, but this meme just hasn't evolved. It’s stuck in the same format with no room for creativity. I think it’s time we all just move on to something actually fresh and original."
  };

  // ============================================================

  var input = document.getElementById('codeinput');
  var btn = document.getElementById('tunebtn');
  var errormsg = document.getElementById('errormsg');
  const signalHistory = document.getElementById("history");
  var signaltext = document.getElementById('signaltext');
  var staticOverlay = document.getElementById('static');
  var foundCount = 0;

  function tryUnlock() {
    var raw = input.value.trim().toUpperCase();
    if (!raw) return;

    var entry = SIGNALS[raw];

    if (entry) {
      errormsg.classList.remove('show');

      var block = document.createElement('div');
      block.className = 'signalblock';

      var fragClass = entry.type === 'decoy' ? 'fragment decoy' : 'fragment';

      block.innerHTML =
        '<div class="freqlabel">FREQ ' + raw + ' — LOCKED</div>' +
        '<div class="' + fragClass + '">' + entry.fragment + '</div>' +
        '<div class="timestamp">' + entry.timestamp + '</div>';

      signalHistory.appendChild(block);
      requestAnimationFrame(function() {
        block.classList.add('show');
      });

      foundCount++;
      signaltext.textContent = "SIGNAL ACQUIRED";
      staticOverlay.style.animation = 'none';
      staticOverlay.style.opacity = '0.1';

      input.value = '';
    } else {
      errormsg.classList.add('show');
      setTimeout(function() {
        errormsg.classList.remove('show');
      }, 1500);
    }
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryUnlock();
  });
</script>

</body>
</html>
